<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Content Security Policy — GitHub Pages doesn't support HTTP headers,
      so we use the meta tag equivalent. This restricts XSS attack surface.
      Adjust 'connect-src' if you add any external API in the future.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        connect-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
      "
    />

    <!-- Referrer policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <!-- SEO -->
    <title>PropostaSimples — Gerador de Propostas para MEI</title>
    <meta
      name="description"
      content="Crie propostas comerciais profissionais em PDF de forma simples e gratuita. Ideal para MEI e pequenos empreendedores."
    />
    <meta name="author" content="PropostaSimples" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PropostaSimples — Gerador de Propostas para MEI" />
    <meta
      property="og:description"
      content="Crie propostas comerciais profissionais em PDF. Grátis, sem cadastro, dados ficam no seu navegador."
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="PropostaSimples" />
    <meta
      name="twitter:description"
      content="Propostas profissionais para MEI. Grátis e sem cadastro."
    />

    <!-- PWA color -->
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="color-scheme" content="light dark" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
